services:
  postgres:
    image: postgres:16-alpine
    container_name: cinerankml-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cinerankml}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cinerankml}
      POSTGRES_DB: ${POSTGRES_DB:-cinerankml}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cinerankml} -d ${POSTGRES_DB:-cinerankml}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cinerankml

  migrate:
    build:
      context: .
      dockerfile: infra/docker/migrate/Dockerfile
    container_name: cinerankml-migrate
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-cinerankml}:${POSTGRES_PASSWORD:-cinerankml}@postgres:5432/${POSTGRES_DB:-cinerankml}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - cinerankml

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: cinerankml-kafka
    profiles:
      - stream
      - ratings
      - tags
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - cinerankml

  ratings-producer:
    build:
      context: .
      dockerfile: infra/docker/workers/Dockerfile
      args:
        PACKAGE: ratings-producer
    container_name: cinerankml-ratings-producer
    profiles:
      - stream
      - ratings
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-cinerankml}:${POSTGRES_PASSWORD:-cinerankml}@postgres:5432/${POSTGRES_DB:-cinerankml}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CSV_PATH: /data/ratings.csv
      ROWS_PER_SECOND: ${ROWS_PER_SECOND:-1000}
      ROW_LIMIT: ${ROW_LIMIT:-}
      METRICS_PORT: 9101
      WORKER_NAME: ratings-producer
    volumes:
      - ./datasets/ml-25m:/data:ro
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - cinerankml

  ratings-consumer:
    build:
      context: .
      dockerfile: infra/docker/workers/Dockerfile
      args:
        PACKAGE: ratings-consumer
    container_name: cinerankml-ratings-consumer
    profiles:
      - stream
      - ratings
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-cinerankml}:${POSTGRES_PASSWORD:-cinerankml}@postgres:5432/${POSTGRES_DB:-cinerankml}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      METRICS_PORT: 9102
      WORKER_NAME: ratings-consumer
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - cinerankml

  tags-producer:
    build:
      context: .
      dockerfile: infra/docker/workers/Dockerfile
      args:
        PACKAGE: tags-producer
    container_name: cinerankml-tags-producer
    profiles:
      - stream
      - tags
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-cinerankml}:${POSTGRES_PASSWORD:-cinerankml}@postgres:5432/${POSTGRES_DB:-cinerankml}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CSV_PATH: /data/tags.csv
      ROWS_PER_SECOND: ${ROWS_PER_SECOND:-1000}
      ROW_LIMIT: ${ROW_LIMIT:-}
      METRICS_PORT: 9103
      WORKER_NAME: tags-producer
    volumes:
      - ./datasets/ml-25m:/data:ro
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - cinerankml

  tags-consumer:
    build:
      context: .
      dockerfile: infra/docker/workers/Dockerfile
      args:
        PACKAGE: tags-consumer
    container_name: cinerankml-tags-consumer
    profiles:
      - stream
      - tags
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-cinerankml}:${POSTGRES_PASSWORD:-cinerankml}@postgres:5432/${POSTGRES_DB:-cinerankml}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      METRICS_PORT: 9104
      WORKER_NAME: tags-consumer
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - cinerankml

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: cinerankml-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-cinerankml}:${POSTGRES_PASSWORD:-cinerankml}@postgres:5432/${POSTGRES_DB:-cinerankml}?sslmode=disable"
    command:
      - --extend.query-path=/queries/queries.yml
    volumes:
      - ./infra/postgres-exporter/queries.yml:/queries/queries.yml:ro
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - cinerankml

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: cinerankml-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres-exporter:
        condition: service_started
    networks:
      - cinerankml

  grafana:
    image: grafana/grafana:11.1.0
    container_name: cinerankml-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      prometheus:
        condition: service_started
    networks:
      - cinerankml

volumes:
  pgdata:

networks:
  cinerankml:
    driver: bridge
