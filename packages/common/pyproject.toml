[project]
name = "common"
version = "0.1.0"
description = "Shared utilities for CineRankML"
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy>=2.0",
    "alembic",
    "psycopg[binary]",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "confluent-kafka>=2.6",
    "prometheus-client>=0.21",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/common"]
