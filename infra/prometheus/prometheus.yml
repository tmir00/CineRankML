global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: ratings-producer
    static_configs:
      - targets: ["ratings-producer:9101"]

  - job_name: ratings-consumer
    static_configs:
      - targets: ["ratings-consumer:9102"]

  - job_name: tags-producer
    static_configs:
      - targets: ["tags-producer:9103"]

  - job_name: tags-consumer
    static_configs:
      - targets: ["tags-consumer:9104"]

  - job_name: embedder-api
    static_configs:
      - targets: ["embedder-api:9110"]

  - job_name: opensearch-exporter
    static_configs:
      - targets: ["opensearch-exporter:9114"]

  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]
