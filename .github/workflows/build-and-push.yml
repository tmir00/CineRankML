# Build online images to GHCR and bump tags in CineRankML-deploy.
#
# Required repository secret (CineRankML → Settings → Secrets and variables → Actions):
#   DEPLOY_REPO_TOKEN — PAT with Contents: Read and write on tmir00/CineRankML-deploy
#   (classic `repo` scope, or a fine-grained token limited to that repo).
#
# GITHUB_TOKEN is used for GHCR push (packages:write). No extra secret needed for GHCR
# when packages are owned by the same user/org as this repository.

name: Build and push images

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  DEPLOY_REPO: tmir00/CineRankML-deploy

jobs:
  build-and-push:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: cinerankml-migrate
            dockerfile: infra/docker/migrate/Dockerfile
            build_args: ""
          - image: cinerankml-ratings-consumer
            dockerfile: infra/docker/workers/Dockerfile
            build_args: PACKAGE=ratings-consumer
          - image: cinerankml-embedder-api
            dockerfile: infra/docker/services/Dockerfile
            build_args: PACKAGE=embedder-api
          - image: cinerankml-recommender-api
            dockerfile: infra/docker/apps/Dockerfile
            build_args: PACKAGE=recommender-api
          - image: cinerankml-frontend
            dockerfile: infra/docker/frontend/Dockerfile
            build_args: VITE_RECOMMENDER_API_URL=https://cinerankml.taahaamir.com/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image owner
        id: meta
        run: |
          owner="${{ github.repository_owner }}"
          echo "owner=${owner,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/${{ matrix.image }}:latest
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  update-deploy:
    name: Bump deploy image tags
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Lowercase image owner
        id: meta
        run: |
          owner="${{ github.repository_owner }}"
          echo "owner=${owner,,}" >> "$GITHUB_OUTPUT"

      - name: Checkout deploy repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEPLOY_REPO }}
          ref: main
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}
          path: deploy

      - name: Install kustomize
        run: |
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.6.0/kustomize_v5.6.0_linux_amd64.tar.gz" \
            | tar xz -C /usr/local/bin kustomize
          kustomize version

      - name: Update image tags
        working-directory: deploy/overlays/prod
        env:
          OWNER: ${{ steps.meta.outputs.owner }}
          SHA: ${{ github.sha }}
        run: |
          REG="${{ env.REGISTRY }}/${OWNER}"
          kustomize edit set image \
            "${REG}/cinerankml-migrate=${REG}/cinerankml-migrate:${SHA}" \
            "${REG}/cinerankml-ratings-consumer=${REG}/cinerankml-ratings-consumer:${SHA}" \
            "${REG}/cinerankml-embedder-api=${REG}/cinerankml-embedder-api:${SHA}" \
            "${REG}/cinerankml-recommender-api=${REG}/cinerankml-recommender-api:${SHA}" \
            "${REG}/cinerankml-frontend=${REG}/cinerankml-frontend:${SHA}"
          echo "Updated overlays/prod/kustomization.yaml:"
          cat kustomization.yaml

      - name: Commit and push
        working-directory: deploy
        env:
          SHA: ${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add overlays/prod/kustomization.yaml
          if git diff --staged --quiet; then
            echo "No image tag changes to commit."
            exit 0
          fi
          git commit -m "chore: bump images to ${SHA}"
          git push origin HEAD:main
